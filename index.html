<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ball Point — лопни все шары пилой</title>
  <meta name="description" content="Ball Point — натяни рогатку, запусти крутящуюся пилу и лопни все шары. Отскакивай от блоков и не упади в пустоту!" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <canvas id="c"></canvas>

    <div id="hud">
      <div class="hud-item" id="levelLabel">Уровень 1</div>
      <div class="hud-item" id="balloonLabel">🎈 <span>0</span></div>
      <button id="restartBtn" title="Начать уровень заново">↻</button>
      <button id="backToEdBtn" class="hidden" title="Вернуться в редактор">← Редактор</button>
    </div>

    <div id="overlay" class="panel show">
      <h1>Ball&nbsp;Point</h1>
      <p class="tag">Лопни все шары крутящейся пилой</p>
      <ul class="rules">
        <li>🎯 Тяни <b>рогатку</b> назад и отпусти — сила натяжения = дальность полёта.</li>
        <li>⚙️ Пила <b>отскакивает</b> от блоков и стен.</li>
        <li>🎈 Лопни <b>все шары за один бросок</b>!</li>
        <li>🕳️ Промах или падение в <b>пустоту</b> — шары вернутся, пробуй снова.</li>
      </ul>
      <button class="btn" id="startBtn">Играть</button>
      <button class="btn ghost" id="editorBtn">✏️ Редактор уровней</button>
    </div>

    <div id="message" class="panel hidden">
      <h2 id="msgTitle">Готово!</h2>
      <p id="msgText"></p>
      <button class="btn" id="msgBtn">Дальше</button>
    </div>

    <div id="editorUI" class="hidden">
      <div id="edTopbar">
        <div id="edTools">
          <button class="edtool active" data-tool="balloon">🎈 Шар</button>
          <button class="edtool" data-tool="block">🧱 Блок</button>
          <button class="edtool" data-tool="void">🕳️ Пустота</button>
          <button class="edtool" data-tool="anchor">🎯 Рогатка</button>
          <button class="edtool" data-tool="erase">🗑 Стереть</button>
        </div>
        <button id="edMenu" class="edbtn">← Меню</button>
      </div>
      <div id="edBottom">
        <textarea id="edText" spellcheck="false" placeholder="код уровня появится здесь — копируй и присылай мне"></textarea>
        <div id="edBtns">
          <button id="edCopy" class="edbtn">📋 Копировать</button>
          <button id="edLoad" class="edbtn">⬇ Вставить</button>
          <button id="edClear" class="edbtn">Очистить</button>
          <button id="edTest" class="edbtn primary">▶ Тест</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
